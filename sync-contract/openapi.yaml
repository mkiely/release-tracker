openapi: 3.0.3
info:
  title: Release Tracker Sync Contract
  version: 0.13.0
  description: >-
    Consumer-driven contract between the Release Tracker app and a local sync
    service. The APP OWNS this spec; the service CONFORMS to it. The service is an
    anti-corruption layer that translates any external work tracking backend
    into these app-shaped types. Work streams, sprints, work items, and teams/members
    are synced — events are local to the app and intentionally absent.

servers:
  - url: http://localhost:8787
    description: Local sync service (dev)

paths:
  /connectors:
    get:
      operationId: listConnectors
      summary: List available connectors and the config each one needs.
      responses:
        '200':
          description: Available connectors.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ConnectorMeta' }

  /connectors/{type}/validate:
    post:
      operationId: validateConnector
      summary: Validate a connector's config (and optionally creds) before saving.
      parameters:
        - { name: type, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ValidateRequest' }
      responses:
        '200':
          description: Validation outcome.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidateResult' }

  /releases/sync:
    post:
      operationId: syncRelease
      summary: Fetch + map external data for a release into the app's schema.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SyncRequest' }
      responses:
        '200':
          description: The mapped release payload.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MappedRelease' }

  /releases/push:
    post:
      operationId: pushRelease
      summary: Push locally-modified writeable fields back to the external system.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PushRequest' }
      responses:
        '200':
          description: Push outcome.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PushResult' }
        '422':
          description: One or more changes failed the service's validation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationProblem' }

  /releases/items:
    post:
      operationId: createItem
      summary: Create a new work item in the external system and return it mapped.
      description: >-
        Only valid when the connector advertises a `creatable.item` capability.
        The service creates the item in the backend, assigns its key/id, and
        returns the fully-normalized MappedItem so the app can reconcile it as a
        synced item (no follow-up sync required).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateItemRequest' }
      responses:
        '200':
          description: The created item, normalized to the app's schema.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MappedItem' }
        '422':
          description: >-
            The request failed validation. The service is the validation
            authority — it checks the catalog's declared constraints AND its
            backend's conditional/cross-field rules, which the app cannot know.
            fieldErrors lets the form mark the offending inputs.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationProblem' }

components:
  schemas:
    Status:
      type: string
      description: >-
        The app's five canonical work-item statuses — the CATEGORIES the app's
        derivations (capacity, health, segments) compute over. The service must
        coerce every native state to one of these. Connectors with richer
        workflows additionally declare their native states via
        ConnectorMeta.statuses and tag items with statusNative.
      enum: [Not Started, In Progress, Under Review, Blocked, Complete]

    StatusDef:
      type: object
      description: >-
        One native workflow state of the connector's backend, mapped onto a
        canonical category. The full list (ConnectorMeta.statuses) is the status
        vocabulary: it supplies the app's edit options and validates pushed
        statusId values. Two or more native states may share a category.
      required: [id, label, category]
      properties:
        id: { type: string, description: 'Connector-native state id, e.g. in_review.' }
        label: { type: string, description: 'Display label, e.g. "In Review".' }
        category: { $ref: '#/components/schemas/Status' }

    StatusRef:
      type: object
      description: >-
        An item's native workflow state (denormalized id + label, mirroring
        itemType). The item's `status` field still carries the canonical
        category; this adds the real state for display.
      required: [id, label]
      properties:
        id: { type: string }
        label: { type: string }

    AttributeBag:
      type: object
      description: >-
        Connector vocabulary values, keyed by FieldSpec.key. Carries ONLY fields
        declared in the connector's catalog that do not map to a canonical field
        (no `role`, not `kind: ref`, not an app-canonical enum) — canonical values
        travel in `fields`/ref ids, never here. Scalars only. The service filters
        and coerces values to the declared `kind` at the boundary, so consumers can
        trust the bag without re-validating. Connector-owned: external wins on sync.
      additionalProperties:
        nullable: true
        oneOf:
          - { type: string }
          - { type: number }
          - { type: boolean }

    MappedWorkStream:
      type: object
      required: [externalId, fields]
      properties:
        externalId: { type: string }
        attributes: { $ref: '#/components/schemas/AttributeBag' }
        fields:
          type: object
          required: [name]
          properties:
            name: { type: string }
            build:
              type: string
              nullable: true
              description: >-
                Build/release label this work stream belongs to, when it differs
                from the release being synced (e.g. "Orion 1.5") — i.e. the stream
                was carried in from a prior release rather than planned for this one.
                Null (or omitted) for streams native to the current release. Mirrors
                the item-level `build` field; lets the app hide carried-in streams.

    MappedSprint:
      type: object
      required: [externalId, fields]
      properties:
        externalId: { type: string }
        fields:
          type: object
          required: [name, startISO, endISO]
          properties:
            name: { type: string }
            startISO: { type: string, description: 'YYYY-MM-DD' }
            endISO: { type: string, description: 'YYYY-MM-DD' }

    MappedMember:
      type: object
      required: [externalId, fields]
      properties:
        externalId: { type: string }
        fields:
          type: object
          required: [name]
          properties:
            name: { type: string }
            nonContributing:
              type: boolean
              description: >-
                When true, this member does not count toward team capacity (e.g. EMs, PMs).
                Treated as a hint: applied on initial member creation; the app owns the value
                after that and the user may override it. Omit or false for engineers.

    MappedTeam:
      type: object
      required: [externalId, fields, members]
      properties:
        externalId: { type: string }
        fields:
          type: object
          required: [name]
          properties:
            name: { type: string }
        members:
          type: array
          items: { $ref: '#/components/schemas/MappedMember' }

    MappedItem:
      type: object
      required: [externalId, extWorkStreamId, extSprintId, extAssigneeId, fields]
      properties:
        externalId: { type: string }
        extWorkStreamId:
          type: string
          nullable: true
          description: External epic id; the app resolves it to a local work stream.
        extSprintId:
          type: string
          nullable: true
          description: External sprint id; the app resolves it to a local sprint.
        extAssigneeId:
          type: string
          nullable: true
          description: External assignee id; the app resolves it to a local member.
        attributes: { $ref: '#/components/schemas/AttributeBag' }
        fields:
          type: object
          required: [key, subject, description, status, points]
          properties:
            key: { type: string, description: 'External-provided, e.g. PROJ-123' }
            subject: { type: string }
            description: { type: string }
            status: { $ref: '#/components/schemas/Status' }
            statusNative:
              nullable: true
              allOf:
                - { $ref: '#/components/schemas/StatusRef' }
              description: >-
                The item's native workflow state, when the connector declares a
                status vocabulary. Must be one of ConnectorMeta.statuses (its
                category must equal this item's `status`). Omit/null when the
                backend has no richer workflow than the canonical five.
            points: { type: number }
            build:
              type: string
              nullable: true
              description: >-
                Optional build/release label for patch items originating from a prior
                release (e.g. "Orion 1.5"). Set by the connector when the item's fix
                version differs from the current release. Null for native items.
            descriptionFormat:
              type: string
              enum: [text, html]
              description: 'Format of the description field. Omit or text for plain text; html for HTML rich text.'
            itemType:
              nullable: true
              description: >-
                Connector-assigned work item type (e.g. Bug, Story, Task). Read-only in the app.
                The `id` preserves the connector's native type key for future item-creation support;
                `label` is the display string shown in the UI.
              type: object
              required: [label]
              properties:
                id:
                  type: string
                  nullable: true
                  description: Connector-native type ID; null if the connector does not expose one.
                label: { type: string, description: 'Display label, e.g. Bug, Story, Task, Investigation.' }

    MappedRelease:
      type: object
      description: The sync payload for one release. Normalized, keyed by externalId.
      required: [workStreams, sprints, items]
      properties:
        team:
          nullable: true
          allOf:
            - { $ref: '#/components/schemas/MappedTeam' }
          description: Optional team + roster. When present on a connector release the app upserts members and repoints release.teamId.
        workStreams:
          type: array
          items: { $ref: '#/components/schemas/MappedWorkStream' }
        sprints:
          type: array
          items: { $ref: '#/components/schemas/MappedSprint' }
        items:
          type: array
          items: { $ref: '#/components/schemas/MappedItem' }

    ConnectorConfigField:
      type: object
      required: [key, label, required]
      properties:
        key: { type: string }
        label: { type: string }
        required: { type: boolean }
        hint: { type: string }
        type:
          type: string
          enum: [text, date, number, password]
          description: 'Input type hint for the UI; controls which input control is rendered. Omit or use text for plain text inputs.'

    FieldSpec:
      type: object
      description: >-
        Describes ONE field of an item type as DATA, never as a control. The app's
        presentation registry maps (kind, role, target) to an input; the contract
        never names a UI control. Access is per field: `creatable` (shown on the
        create form) and `writeable` (pushable on an existing item). A field with
        creatable:true, writeable:false is set once at creation and immutable after.
      required: [key, kind]
      properties:
        key:
          type: string
          description: Connector-native field key, echoed back in CreateItemRequest.fields (or mapped to a ref id for ref kinds).
        label: { type: string }
        kind:
          type: string
          enum: [string, number, boolean, date, enum, ref]
          description: The field's data kind. Drives validation and (via the app registry) the control.
        target:
          type: string
          enum: [workStream, sprint, member]
          description: 'For kind=ref: the release entity referenced. Resolved to a live entity + a wire ref id (extWorkStreamId/extSprintId/extAssigneeId).'
        enumRef:
          type: string
          enum: [status]
          description: 'For kind=enum backed by an app-canonical set (the app supplies the options); else use `options`.'
        role:
          type: string
          enum: [subject, description, points, status]
          description: >-
            Optional semantic tag for fields that map to well-known app concepts.
            Lets the app recognize a field regardless of `key` (e.g. Jira's
            customfield_10016 with role=points) — used for serialization + control choice.
        hint: { type: string, description: 'Placeholder / helper text for the input.' }
        multiline: { type: boolean, description: 'kind=string: long-form text (data hint; registry → textarea).' }
        sensitive: { type: boolean, description: 'kind=string: secret value (data hint; registry → masked input).' }
        options:
          type: array
          description: Choices for kind=enum (connector-defined).
          items:
            type: object
            required: [value, label]
            properties:
              value: { type: string }
              label: { type: string }
        required: { type: boolean }
        min: { type: number }
        max: { type: number }
        step: { type: number }
        maxLength: { type: number }
        pattern: { type: string, description: 'Regex the value must match (kind=string).' }
        creatable: { type: boolean, description: 'Shown on the create form. Default false.' }
        writeable: { type: boolean, description: 'Pushable on an existing item. Default false.' }

    ConnectorItemType:
      type: object
      description: >-
        One work-item type the connector emits, with its full field catalog. Lists
        every field (creatable and/or writeable), each declared once. The app
        derives the create form (creatable fields), push capability (writeable
        fields), and edit lock-state from this single source.
      required: [id, label, fields]
      properties:
        id: { type: string, description: 'Connector-native type id, e.g. jira_story.' }
        label: { type: string, description: 'Display label, e.g. Story.' }
        fields:
          type: array
          items: { $ref: '#/components/schemas/FieldSpec' }

    ConnectorMeta:
      type: object
      required: [type, label, configFields]
      properties:
        type: { type: string, description: "e.g. 'jira'" }
        label: { type: string, description: "e.g. 'Jira'" }
        configFields:
          type: array
          items: { $ref: '#/components/schemas/ConnectorConfigField' }
        itemTypes:
          type: array
          description: >-
            The connector's work-item type catalog. Absent or empty means no item
            types are exposed: nothing is creatable (the app hides "New work item")
            and nothing is writeable.
          items: { $ref: '#/components/schemas/ConnectorItemType' }
        statuses:
          type: array
          description: >-
            The connector's status vocabulary: every native workflow state it can
            emit, each mapped to a canonical category. Drives the app's status
            edit options (when an item type declares a writeable status field)
            and validates pushed statusId values. Absent or empty means the
            backend uses the canonical five directly and items carry no
            statusNative.
          items: { $ref: '#/components/schemas/StatusDef' }

    ReleaseConnector:
      type: object
      description: A release's binding to a backend. config holds only non-secret routing params.
      required: [type, config]
      properties:
        type: { type: string }
        config:
          type: object
          additionalProperties: { type: string }

    ValidateRequest:
      type: object
      required: [config]
      properties:
        config:
          type: object
          additionalProperties: { type: string }

    FieldError:
      type: object
      description: One field-level validation failure.
      required: [field, message]
      properties:
        field:
          type: string
          description: >-
            The offending input: a FieldSpec.key for scalar/enum fields, or the
            ref field's key for unresolved/missing refs.
        message: { type: string, description: 'Human-readable, form-displayable.' }

    ValidationProblem:
      type: object
      description: >-
        Body of a 422 response. `error` summarizes; `fieldErrors` (when present)
        pins failures to specific inputs so the app's form can mark them inline
        instead of showing one opaque toast.
      required: [error]
      properties:
        error: { type: string }
        fieldErrors:
          type: array
          items: { $ref: '#/components/schemas/FieldError' }

    ValidateResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        error: { type: string }

    SyncRequest:
      type: object
      required: [connector]
      properties:
        connector: { $ref: '#/components/schemas/ReleaseConnector' }

    PushItemChange:
      type: object
      required: [externalId, fields]
      description: A single writeable-field update for one work item to push back.
      properties:
        externalId: { type: string }
        fields:
          type: object
          description: Only writeable fields that are locally dirty.
          properties:
            points: { type: number }
            extSprintId:
              type: string
              nullable: true
              description: External sprint id, or null for backlog.
            statusId:
              type: string
              description: >-
                Native status id (a StatusDef.id from the connector's vocabulary)
                to transition the item to. Only sent when the item's type declares
                a writeable status field; the service must validate the id against
                its vocabulary before writing.
            attributes:
              allOf:
                - { $ref: '#/components/schemas/AttributeBag' }
              description: >-
                Dirty vocabulary values, keyed by FieldSpec.key. Only fields the
                item type declares writeable. The service must validate against
                its catalog (declared key, coercible kind, enum membership)
                before writing to the backend.

    PushRequest:
      type: object
      required: [connector, changes]
      properties:
        connector: { $ref: '#/components/schemas/ReleaseConnector' }
        changes:
          type: array
          items: { $ref: '#/components/schemas/PushItemChange' }

    PushResult:
      type: object
      required: [pushed, failed, errors]
      properties:
        pushed: { type: number }
        failed: { type: number }
        errors:
          type: array
          items: { type: string }

    CreateItemRequest:
      type: object
      description: >-
        Request to create one work item. `type` is a CreatableItemType.id. The ref
        ids carry the well-known stream/sprint/member selections (resolved by the
        app from local entities to externalIds); `fields` carries the remaining
        well-known scalars (subject, description, points, status) and any custom
        field values, keyed by FieldSpec.key.
      required: [connector, type]
      properties:
        connector: { $ref: '#/components/schemas/ReleaseConnector' }
        type: { type: string }
        extWorkStreamId: { type: string, nullable: true }
        extSprintId: { type: string, nullable: true }
        extAssigneeId: { type: string, nullable: true }
        fields:
          type: object
          additionalProperties: true
